name: srm-generate-invoice
description: SRM 对账单管理 - 生成SAP暂估发票 + 对账单确认

params:
  - name: settlement_number
    type: string
    required: true
    description: 对账单号（如 9600003435）
  - name: invoice_date
    type: string
    description: 开票日期（YYYY.MM.DD），默认今天
  - name: posting_date
    type: string
    description: 过账日期（YYYY.MM.DD），默认今天
  - name: base_date
    type: string
    description: 基准日期（YYYY.MM.DD），默认今天
  - name: email
    type: string
    description: 确认邮件地址（对账单确认时发送）

steps:
  - id: navigate_srm
    action: navigate_url
    params:
      url: "SRM_MANAGEMENT_URL"

  - id: fill_query
    action: fill_fields
    params:
      fields:
        对账单单号: "{{settlement_number}}"

  - id: query
    action: click_button
    params:
      button: 查询

  - id: wait_results
    action: wait
    params:
      ms: "2000"

  - id: confirm_settlement
    action: click_button
    params:
      button: 对账单确认

  - id: wait_confirm
    action: wait
    params:
      ms: "2000"

  - id: fill_email_if_needed
    action: fill_fields
    params:
      fields:
        其他邮件地址: "{{email}}"

  - id: submit_confirm
    action: click_button
    params:
      button: 提交

  - id: wait_submit
    action: wait
    params:
      ms: "2000"

  - id: generate_invoice
    action: click_button
    params:
      button: 生成SAP暂估发票
    on_error: ai_diagnose

  - id: fill_invoice_dialog
    action: fill_fields
    params:
      fields:
        开票日期: "{{invoice_date}}"
        过账日期: "{{posting_date}}"
        基准日期: "{{base_date}}"

  - id: confirm_invoice
    action: click_button
    params:
      button: 确定

  - id: wait_invoice
    action: wait
    params:
      ms: "3000"

  - id: capture_result
    action: extract_text
    params:
      element: sap_invoice_number
    output: sap_invoice_number

  - id: screenshot_result
    action: screenshot
    params:
      name: srm-invoice-generated
