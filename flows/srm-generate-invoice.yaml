name: srm-generate-invoice
description: Generate an SAP estimated invoice from a reviewed SRM settlement document after explicit human approval.
metadata:
  schema_version: flow-v1
  adapter: sap-srm
  risk: irreversible
params:
  - name: settlement_number
    type: string
    required: true
    description: Confirmed SRM settlement document number used to generate the SAP estimated invoice.
  - name: invoice_date
    type: string
    required: true
    description: Invoice date in business-approved format, for example YYYY.MM.DD.
  - name: posting_date
    type: string
    required: true
    description: Posting date in business-approved format, for example YYYY.MM.DD.
  - name: base_date
    type: string
    required: true
    description: Baseline date in business-approved format, for example YYYY.MM.DD.
steps:
  - id: generate_invoice
    action: srm_generate_invoice
    params:
      settlement_number: "{{settlement_number}}"
      invoice_date: "{{invoice_date}}"
      posting_date: "{{posting_date}}"
      base_date: "{{base_date}}"
    expect:
      - text: SAP invoice number or invoice generation success evidence is visible.
    requires_approval: true
    approval_reason: Generating an SAP estimated invoice changes business state and must be reviewed before execution.
    output: invoice_generation_result
