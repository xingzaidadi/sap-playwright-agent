name: full-procurement-settlement
metadata:
  schema_version: flow-v1
  adapters:
    - sap-ecc
    - sap-srm
  risk: irreversible
description: End-to-end procurement settlement flow across SAP ECC and SRM.

params:
  - name: po_number
    type: string
    required: true
    description: Existing or created purchase order number.
  - name: vendor
    type: string
    required: true
    description: Supplier/vendor id.
  - name: company_code
    type: string
    default: "1110"
  - name: purchasing_org
    type: string
    default: "1110"
  - name: material
    type: string
    description: Material number for PO creation.
  - name: quantity
    type: number
    description: PO quantity for PO creation.
  - name: plant
    type: string
    default: "1112"
  - name: currency
    type: string
    default: "CNY"
  - name: settlement_desc
    type: string
    default: "WH"
  - name: year_month
    type: string
    required: true
    description: Settlement year and month, for example 202509.
  - name: invoice_date
    type: string
    required: true
    description: Business-approved invoice date, for example YYYY.MM.DD.
  - name: posting_date
    type: string
    required: true
    description: Business-approved posting date, for example YYYY.MM.DD.
  - name: base_date
    type: string
    required: true
    description: Business-approved baseline date, for example YYYY.MM.DD.
  - name: po_scan_file_path
    type: string
    required: true
    description: Reviewed local PDF/image file for SRM PO scan upload.
  - name: po_scan_sensitive_content_reviewed
    type: boolean
    required: true
    description: Must be true only after supplier/private content and upload scope are reviewed.
  - name: skip_po_creation
    type: boolean
    default: true
    description: Skip PO creation when using an existing PO.
  - name: skip_receipt
    type: boolean
    default: true
    description: Skip goods receipt when the PO has already been received.
  - name: include_return
    type: boolean
    default: false
    description: Include optional goods return.
  - name: return_quantity
    type: number
    description: Optional return quantity.

steps:
  - id: create_po
    action: run_sub_flow
    requires_approval: true
    approval_reason: Starts an end-to-end procurement and settlement flow that may create or update business documents.
    params:
      flow: create-po
      condition: "{{skip_po_creation}} != true"
      params:
        vendor: "{{vendor}}"
        material: "{{material}}"
        quantity: "{{quantity}}"
        plant: "{{plant}}"
        company_code: "{{company_code}}"
        purchasing_org: "{{purchasing_org}}"
    output: po_number
    on_error: screenshot_and_report

  - id: release_po
    action: run_sub_flow
    params:
      flow: release-po
      condition: "{{skip_po_creation}} != true"
      params:
        po_number: "{{po_number}}"
    on_error: screenshot_and_report

  - id: goods_receipt
    action: run_sub_flow
    params:
      flow: goods-receipt
      condition: "{{skip_receipt}} != true"
      params:
        po_number: "{{po_number}}"
    output: material_document
    on_error: screenshot_and_report

  - id: goods_return
    action: run_sub_flow
    params:
      flow: goods-return
      condition: "{{include_return}} == true"
      params:
        po_number: "{{po_number}}"
        return_quantity: "{{return_quantity}}"
    output: return_document
    on_error: screenshot_and_report

  - id: query_po_details
    action: api_call
    params:
      api: queryPODetails
      args:
        po_number: "{{po_number}}"
    output: po_details

  - id: bind_supplier
    action: api_call
    params:
      api: bindSupplierRelation
      args:
        settlement_id: "{{settlement_id}}"
        vendor_id: "{{vendor}}"
    on_error: screenshot_and_report

  - id: upload_po_scan
    action: srm_upload_po_scan
    requires_approval: true
    approval_reason: Uploading PO scan files changes SRM attachment state and may expose supplier-sensitive content.
    params:
      vendor: "{{vendor}}"
      po_number: "{{po_number}}"
      file_path: "{{po_scan_file_path}}"
      sensitive_content_reviewed: "{{po_scan_sensitive_content_reviewed}}"
    on_error: screenshot_and_report

  - id: create_settlement
    action: srm_create_settlement
    requires_approval: true
    approval_reason: Creating an SRM settlement document changes business state and must be reviewed before execution.
    params:
      vendor: "{{vendor}}"
      company_code: "{{company_code}}"
      purchasing_org: "{{purchasing_org}}"
      currency: "{{currency}}"
      settlement_desc: "{{settlement_desc}}"
      year_month: "{{year_month}}"
    output: settlement_number
    on_error: ai_diagnose

  - id: confirm_settlement
    action: srm_confirm_settlement
    requires_approval: true
    approval_reason: Confirming SRM settlement changes business state and must be reviewed before invoice generation.
    params:
      settlement_id: "{{settlement_number}}"
    output: settlement_confirmation
    on_error: ai_diagnose

  - id: generate_invoice
    action: srm_generate_invoice
    requires_approval: true
    approval_reason: Generating an SAP estimated invoice changes business state and must be reviewed after settlement confirmation.
    params:
      settlement_number: "{{settlement_number}}"
      invoice_date: "{{invoice_date}}"
      posting_date: "{{posting_date}}"
      base_date: "{{base_date}}"
    output: sap_invoice_number
    on_error: ai_diagnose

  - id: verify_result
    action: screenshot
    params:
      name: full-flow-complete

  - id: capture_final
    action: extract_text
    params:
      element: status_bar
    output: final_status
