name: create-invoice
description: Simulate SAP MIRO invoice from a purchase order without posting.
metadata:
  schema_version: flow-v1
  adapter: sap-ecc
  risk: simulated_change

params:
  - name: company_code
    type: string
    required: true
    description: Company code
  - name: po_number
    type: string
    required: true
    description: Purchase order number
  - name: invoice_date
    type: string
    description: Invoice date (YYYY/MM/DD)
  - name: currency
    type: string
    default: "CNY"
    description: Currency

steps:
  - id: navigate
    action: navigate_tcode
    params:
      tcode: MIRO

  - id: fill_company_code
    action: fill_fields
    params:
      fields:
        公司代码: "{{company_code}}"

  - id: confirm_company_code
    action: press_key
    params:
      key: Enter

  - id: wait_miro_load
    action: wait
    params:
      ms: "2000"

  - id: fill_invoice_date
    action: fill_fields
    params:
      fields:
        凭证中的发票日期: "{{invoice_date}}"
    on_error: screenshot_and_report

  - id: fill_po
    action: fill_fields
    params:
      fields:
        采购凭证: "{{po_number}}"
    on_error: screenshot_and_report

  - id: press_enter_load_po
    action: press_key
    params:
      key: Enter

  - id: wait_po_load
    action: wait
    params:
      ms: "3000"

  - id: screenshot_before_post
    action: screenshot
    params:
      name: miro-before-post

  - id: simulate
    action: click_button
    params:
      button: 模拟
    on_error: ai_diagnose

  - id: capture_result
    action: extract_text
    params:
      element: status_bar
    output: document_number
