name: srm-reject-settlement
description: SRM 对账单驳回（退回）

params:
  - name: settlement_id
    type: string
    required: true
    description: 对账单号（96开头）

steps:
  - id: navigate_manage
    action: srm_navigate
    params:
      menu: 管理对账单

  - id: query_settlement
    action: fill_and_query
    params:
      field: 对账单单号
      value: "{{settlement_id}}"
      button: 查询 强调

  - id: select_row
    action: click_text
    params:
      text: "{{settlement_id}}"
      nth: 1

  - id: click_reject
    action: click_button
    params:
      button: 对账单退回
      force: true
      triple_click: true

  - id: handle_reject_dialog
    action: handle_dialog
    params:
      match_text: 退回|原因
      select_dropdown: first_non_empty
      submit_button: 提交

  - id: screenshot_result
    action: screenshot
    params:
      name: srm-settlement-rejected
